<!DOCTYPE html>
<html lang="bn">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Security | Social Security Hub</title>
  
  <!-- Font Awesome CDN (আইকনের জন্য) -->
  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.1/css/all.min.css">
  
  <style>
    /* বেসিক রিসেট ও ফন্ট স্টাইল */
    * {
      box-sizing: border-box;
      margin: 0;
      padding: 0;
      font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
    }
    
    body {
      background-color: #f4f6f9;
      color: #333;
      line-height: 1.6;
    }

    /* হেডার ও নেভিগেশন বার */
    header {
      background-color: #0f172a;
      color: #fff;
      padding: 1rem 1.5rem;
      display: flex;
      justify-content: space-between;
      align-items: center;
      position: sticky;
      top: 0;
      z-index: 1000;
    }

    .logo {
      font-size: 1.2rem;
      font-weight: bold;
      color: #38bdf8;
      display: flex;
      align-items: center;
      gap: 0.5rem;
    }

    /* রাইট সাইড আইকন অ্যাকশন */
    .header-actions {
      display: flex;
      align-items: center;
      gap: 1.2rem;
    }

    .action-btn {
      background: none;
      border: none;
      color: #cbd5e1;
      font-size: 1.2rem;
      cursor: pointer;
      transition: color 0.3s;
    }

    .action-btn:hover {
      color: #38bdf8;
    }

    /* হিরো সেকশন */
    .hero {
      text-align: center;
      padding: 3rem 1rem;
      background: linear-gradient(135deg, #1e293b, #0f172a);
      color: #fff;
    }

    .hero h1 {
      font-size: 2rem;
      margin-bottom: 1rem;
    }

    .hero p {
      max-width: 600px;
      margin: 0 auto 1.5rem auto;
      color: #94a3b8;
      font-size: 1rem;
    }

    .btn-container {
      display: flex;
      justify-content: center;
      gap: 1rem;
    }

    .btn {
      padding: 0.7rem 1.5rem;
      border: none;
      border-radius: 5px;
      font-weight: bold;
      cursor: pointer;
      text-decoration: none;
      transition: background 0.3s;
    }

    .btn-primary {
      background-color: #0284c7;
      color: #fff;
    }

    .btn-primary:hover {
      background-color: #0369a1;
    }

    .btn-secondary {
      background-color: transparent;
      color: #38bdf8;
      border: 1px solid #38bdf8;
    }

    .btn-secondary:hover {
      background-color: rgba(56, 189, 248, 0.1);
    }

    /* সোশ্যাল প্ল্যাটফর্ম সেকশন */
    .platforms-section {
      max-width: 900px;
      margin: 2.5rem auto;
      padding: 0 1rem;
      text-align: center;
    }

    .platforms-section h2 {
      margin-bottom: 1.5rem;
      font-size: 1.4rem;
      color: #0f172a;
    }

    .platform-grid {
      display: grid;
      grid-template-columns: repeat(auto-fit, minmax(130px, 1fr));
      gap: 1rem;
    }

    .platform-card {
      background: #fff;
      padding: 1.2rem;
      border-radius: 8px;
      box-shadow: 0 2px 5px rgba(0,0,0,0.05);
      display: flex;
      flex-direction: column;
      align-items: center;
      gap: 0.5rem;
      text-decoration: none;
      color: #333;
      font-weight: 600;
      transition: transform 0.2s, box-shadow 0.2s;
    }

    .platform-card:hover {
      transform: translateY(-3px);
      box-shadow: 0 5px 15px rgba(0,0,0,0.1);
    }

    .platform-card i {
      font-size: 1.8rem;
    }

    /* সোশ্যাল আইকনের কালার */
    .fa-facebook { color: #1877f2; }
    .fa-tiktok { color: #000; }
    .fa-youtube { color: #ff0000; }
    .fa-instagram { color: #e4405f; }
    .fa-whatsapp { color: #25d366; }
    .fa-telegram { color: #0088cc; }
    .fa-facebook-messenger { color: #0084ff; }
    .fa-x-twitter { color: #000; }
  </style>
</head>
<body>

  <!-- Header Section -->
  <header>
    <div class="logo">
      🛡️ Social Security Hub
    </div>
    
    <div class="header-actions">
      <button class="action-btn" title="Search"><i class="fas fa-search"></i></button>
      <button class="action-btn" title="Toggle Dark Mode"><i class="fas fa-moon"></i></button>
      <button class="action-btn" title="Menu"><i class="fas fa-bars"></i></button>
    </div>
  </header>

  <!-- Hero Section -->
  <section class="hero">
    <h1>🛡️ Protect Your Digital Life</h1>
    <p>
      Learn Facebook, TikTok, YouTube, Instagram, Privacy, Account Recovery, Password Security, Cyber Safety and much more.
    </p>
    <div class="btn-container">
      <a href="#" class="btn btn-primary">Get Started</a>
      <a href="#" class="btn btn-secondary">Learn More</a>
    </div>
  </section>

  <!-- Supported Platforms Grid -->
  <section class="platforms-section">
    <h2>Select Your Platform</h2>
    <div class="platform-grid">
      <a href="#" class="platform-card">
        <i class="fab fa-facebook"></i>
        <span>Facebook</span>
      </a>
      <a href="#" class="platform-card">
        <i class="fab fa-tiktok"></i>
        <span>TikTok</span>
      </a>
      <a href="#" class="platform-card">
        <i class="fab fa-youtube"></i>
        <span>YouTube</span>
      </a>
      <a href="#" class="platform-card">
        <i class="fab fa-instagram"></i>
        <span>Instagram</span>
      </a>
      <a href="#" class="platform-card">
        <i class="fab fa-whatsapp"></i>
        <span>WhatsApp</span>
      </a>
      <a href="#" class="platform-card">
        <i class="fab fa-telegram"></i>
        <span>Telegram</span>
      </a>
      <a href="#" class="platform-card">
        <i class="fab fa-facebook-messenger"></i>
        <span>Messenger</span>
      </a>
      <a href="#" class="platform-card">
        <i class="fab fa-x-twitter"></i>
        <span>X (Twitter)</span>
      </a>
    </div>
  </section>

</body>
</html>
